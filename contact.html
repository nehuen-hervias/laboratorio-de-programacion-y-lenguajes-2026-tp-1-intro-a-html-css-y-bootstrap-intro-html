<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Mi Blog</a>
            <a class="navbar-brand fw-bold" href="about.html">Sobre mí</a>
            <a class="navbar-brand fw-bold" href="contact.html">Contacto</a>
        </div>
    </nav>

    <!-- Formulario de contacto -->
    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h1 class="mb-4">Contacto</h1>

                    <form id="contactForm" novalidate>
                        <!-- Campo nombre (COMPLETAR: validación) -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                            <div class="invalid-feedback">
                                Por favor ingresa tu nombre.
                            </div>
                        </div>

                        <!-- Campo email (COMPLETAR) -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                            <div class="invalid-feedback">
                                Por favor ingresa un email válido.
                            </div>
                        </div>

                        <!-- Campo teléfono (COMPLETAR: opcional) -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Teléfono (opcional)</label>
                            <input type="tel" class="form-control" id="phone" name="phone">
                        </div>

                        <!-- Campo mensaje (COMPLETAR: minlength) -->
                        <div class="mb-3">
                            <label for="message" class="form-label">Mensaje *</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required minlength="10"></textarea>
                            <div class="invalid-feedback">
                                El mensaje debe tener al menos 10 caracteres.
                            </div>
                        </div>

                        <!-- Botón submit -->
                        <button type="submit" class="btn btn-primary btn-lg w-100">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Mi Blog.</p>
        </div>
    </footer>

    <!-- Script: validación HTML5 + feedback visual -->
    <script>
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', (e) => {
            if (!form.checkValidity()) {
                e.preventDefault();
                e.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
